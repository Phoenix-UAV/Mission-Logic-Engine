  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U gcs"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # (Optional) Redis for real-time telemetry caching
  # redis-cache:
  #   image: redis:7-alpine
  #   container_name: drone-gcs-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

# Volumes for persistent data
volumes:
  postgres-data:
  redis-data:

# Networks
networks:
  default:
    name: drone-gcs-network
    driver: bridge

