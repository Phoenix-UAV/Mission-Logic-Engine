version: '3.8'

services:
  # ROS2 Humble environment for custom GCS
  ros2-gcs:
    build:
      context: docker
      dockerfile: Dockerfile
    container_name: drone-gcs-ros2
    
    # Use host network for localhost connections to MAVProxy
    network_mode: host
    
    # Mount source code for live development
    volumes:
      - ./src:/home/ros/drone-gcs/src:rw
      - ./config:/home/ros/drone-gcs/config:rw
      - ./data:/home/ros/drone-gcs/data:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw  # For GUI apps (optional)
    
    # Environment variables
    environment:
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - PYTHONUNBUFFERED=1
    
    # Interactive terminal
    stdin_open: true
    tty: true
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "ros2", "doctor"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Entry point command
    command: /bin/bash

  # (Optional) Database for mission logging
  # postgres-logs:
  #   image: postgres:15-alpine
  #   container_name: drone-gcs-db
  #   environment:
  #     POSTGRES_USER: gcs
